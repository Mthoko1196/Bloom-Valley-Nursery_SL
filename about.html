<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloom Valley Nursery - About Us</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>About Bloom Valley Nursery</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="about.html">About Us</a>
      <a href="custom.html">Community</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Our Story</h2>
      <p>We’ve been serving the community with fresh plants since 1998. Business Hours: Mon–Sat, 9 AM–6 PM.</p>
    </section>

    <section>
      <h2>Feedback & Custom Orders</h2>
      <form id="feedbackForm">
        <label for="name">Name:</label>
        <input type="text" id="name" required><br>

        <label for="contactEmail">Email:</label>
        <input type="email" id="contactEmail" required><br>

        <label for="message">Message:</label>
        <textarea id="message" required></textarea><br>

        <button type="submit">Submit</button>
      </form>
      <form id="subscribeForm">
        <label for="subscribeEmail">Subscribe to Newsletter:</label>
        <input type="email" id="subscribeEmail" placeholder="Enter your email" required>
        <button type="button" id="subscribeBtn">Subscribe</button>
      </form>    

    </section>
  </main>

  <footer>
    <p>Contact us: info@bloomvalley.com</p>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
